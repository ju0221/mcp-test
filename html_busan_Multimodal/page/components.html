		const conboBox = new InitSelectToggle('.cp-select');

		new AllAgree('.cp-all-agree');
	});

	function scrollToHashTarget() {
		if (!location.hash) return;
		const el = document.querySelector(location.hash);
		if (!el) return;

		// 레이아웃 확정 뒤에 2번 정도 재시도
		requestAnimationFrame(() => {
		el.scrollIntoView({ block: 'start', behavior: 'auto' });
		requestAnimationFrame(() => {
			el.scrollIntoView({ block: 'start', behavior: 'auto' });
		});
		});
	}

	window.addEventListener('load', () => {
		setTimeout(scrollToHashTarget, 0);
	});

	window.addEventListener('hashchange', scrollToHashTarget);

    document.querySelectorAll('.cl-target').forEach(anchor => {
        anchor.addEventListener('click', function (e) {
            e.preventDefault(); // 기본 이동 동작 방지

            // 1. 클릭한 요소의 href 속성값 가져오기 (#header 등)
            const targetId = this.getAttribute('href');
            const targetElement = document.querySelector(targetId);

            // 2. 해당 요소가 존재하는지 확인 후 애니메이션 이동
            if (targetElement) {
                targetElement.scrollIntoView({
                    behavior: 'smooth', // 부드러운 스크롤 애니메이션
                    block: 'start'      // 요소의 시작 지점으로 이동
                });
            }
        });
    });    
</script>
